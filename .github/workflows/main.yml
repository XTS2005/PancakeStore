name: Build IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
     - uses: actions/checkout@v3
     - name: 设置脚本执行权限
       run: chmod +x ipabuild.sh
     - name: Compile
       run: ./ipabuild.sh
     - name: Upload artifact
       uses: actions/upload-artifact@v4
       with:
        name: PancakeStore
        path: PancakeStore.ipa