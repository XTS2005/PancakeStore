name: build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: show xcode version
        run: xcodebuild -version

      - name: install ldid
        run: brew install ldid

      - name: 修复项目文件编码
        run: |
          echo "=== 修复项目文件 ==="
          cd PancakeStore.xcodeproj
          
          # 备份原文件
          cp project.pbxproj project.pbxproj.bak
          
          # 移除 BOM 头和修复编码
          # 使用 sed 移除可能存在的 BOM 并确保正确换行
          sed -i '' '1s/^[[:space:]]*//' project.pbxproj
          
          # 使用 plutil 转换格式（从 OpenStep 到 XML，再转回）
          echo "转换为 XML 格式..."
          plutil -convert xml1 project.pbxproj
          
          echo "转换回 OpenStep 格式..."
          plutil -convert binary1 project.pbxproj
          plutil -convert xml1 project.pbxproj
          
          # 验证
          echo "=== 验证项目文件 ==="
          plutil -lint project.pbxproj
          if [ $? -eq 0 ]; then
            echo "✅ 项目文件修复成功"
          else
            echo "❌ 项目文件仍然有问题"
            exit 1
          fi
          
          cd ..

      - name: build
        run: |
          chmod +x ipabuild.sh
          ./ipabuild.sh

      - name: 列出生成的文件
        run: ls -la *.ipa || echo "No IPA files found"

      - name: upload artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lara-ipa
          path: |
            PancakeStore.ipa
            PancakeStore.debug.ipa

      - name: upload release ipa
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: PancakeStore.ipa

  release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download ipa
        uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: ./

      - name: get last 12h commits
        run: |
          COMMITS=$(git log --since="12 hours ago" --pretty=format:"- %h %s (%an)")
          if [ -z "$COMMITS" ]; then
            COMMITS="no commits in the last 12 hours"
          fi

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: write release notes
        run: |
          cat <<EOF > release_notes.txt
          lara nightly build
          
          Last 12 hours commits:
          
          ${COMMITS}
          EOF

      - name: update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly >/dev/null 2>&1 || \
          gh release create nightly \
            --title "Nightly" \
            --notes "initial nightly" \
            --prerelease
      
          gh release edit nightly \
            --title "Nightly" \
            --notes-file release_notes.txt \
            --prerelease
      
          gh release upload nightly PancakeStore.ipa --clobber