name: build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: show xcode version
        run: xcodebuild -version

      - name: install ldid
        run: brew install ldid

      - name: 诊断项目文件
        run: |
          echo "=== 检查项目文件 ==="
          ls -la PancakeStore.xcodeproj/
          echo ""
          echo "=== 检查 project.pbxproj 前几行 ==="
          head -20 PancakeStore.xcodeproj/project.pbxproj
          echo ""
          echo "=== 检查是否有合并冲突 ==="
          grep -n "<<<<<<<" PancakeStore.xcodeproj/project.pbxproj || echo "没有发现合并冲突标记"
          grep -n ">>>>>>>" PancakeStore.xcodeproj/project.pbxproj || echo "没有发现合并冲突标记"
          echo ""
          echo "=== 验证 JSON 格式 ==="
          plutil -lint PancakeStore.xcodeproj/project.pbxproj || echo "项目文件格式有问题"

      - name: build
        run: |
          chmod +x ipabuild.sh
          ./ipabuild.sh

      - name: 列出生成的文件
        run: ls -la *.ipa || echo "No IPA files found"

      - name: upload artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lara-ipa
          path: |
            PancakeStore.ipa
            PancakeStore.debug.ipa

      - name: upload release ipa
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: PancakeStore.ipa

  release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download ipa
        uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: ./

      - name: get last 12h commits
        run: |
          COMMITS=$(git log --since="12 hours ago" --pretty=format:"- %h %s (%an)")
          if [ -z "$COMMITS" ]; then
            COMMITS="no commits in the last 12 hours"
          fi

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: write release notes
        run: |
          cat <<EOF > release_notes.txt
          lara nightly build
          
          Last 12 hours commits:
          
          ${COMMITS}
          EOF

      - name: update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly >/dev/null 2>&1 || \
          gh release create nightly \
            --title "Nightly" \
            --notes "initial nightly" \
            --prerelease
      
          gh release edit nightly \
            --title "Nightly" \
            --notes-file release_notes.txt \
            --prerelease
      
          gh release upload nightly PancakeStore.ipa --clobber